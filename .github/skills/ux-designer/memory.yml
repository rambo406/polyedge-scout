# ─── Design System ───────────────────────────────────────────────────
design_system:
  reference_file: ".github/skills/ux-designer/references/design-conventions.md"
  last_updated: "2026-03-12"
  semantic_tokens_enforced: true
  raw_color_exceptions: ["text-green/red-600 for success/failure", "Chart/data viz colors", "Platform accents (YouTube red, Instagram pink, TikTok cyan)"]
  key_patterns:
    page_shell: "z-page + z-page-header via PageLayoutImports"
    error_state: "z-alert zType='destructive' [zDescription]"
    loading_state: "z-loader + text OR z-skeleton for data-heavy"
    empty_state: "z-empty with icon, title, description, optional action"
    stat_card: "z-card + icon (h-11 w-11 rounded-lg bg-primary/10) + label + value"
    list_item: "rounded-md border border-border p-3 flex items-center justify-between"
    section_heading: "text-xl font-semibold tracking-tight text-foreground mb-4"
  spacing: {page_gap: "gap-6", card_grid: "gap-4", stat_grid: "grid-cols-1 sm:2 lg:4 gap-4", list_items: "space-y-3 or gap-3", button_icon: "mr-2", button_groups: "gap-2 or gap-3"}
  responsive: {cards: "grid-cols-1 sm:2 lg:3", stats: "grid-cols-1 sm:2 lg:4", jobs: "grid-cols-2 sm:3 lg:5"}

